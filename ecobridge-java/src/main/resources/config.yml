
i18n:
  locale: "zh-CN"

system:
  debug: false
  log-sample-rate: 100
  fallback-mode: true

database:
  host: "localhost"
  port: 3306
  database: "ecobridge"
  username: "root"
  password: "change_me_to_real_password"
  pool-size: 15

redis:
  enabled: false
  host: "127.0.0.1"
  port: 6379
  password: ""
  server-id: "survival-01"

economy:
  currency-id: "coins"
  m1-supply: 10000000.0
  volatility-threshold: 50000.0
  daily-decay-rate: 0.05
  tau: 7.0
  sell-ratio: 0.5
  default-lambda: 0.002
  history-days-limit: 7
  holiday-multiplier: 1.2

  macro:
    target-velocity: 0.04
    capacity-per-user: 5000.0

  control:
    predictive:
      horizon-seconds: 259200.0
    lambda:
      min-multiplier: 0.60
      max-multiplier: 2.20

  recovery:
    enabled: true
    floor-ratio-to-history: 0.55
    activation-ratio-to-history: 0.78
    target-ratio-to-history: 0.92
    strength: 0.28
    max-step-per-cycle: 0.03

  player-market:
    enabled: true
    quota:
      enabled: true
      period-hours: 168
      base: 64.0
      gamma-per-hour: 0.4
      global-cap: 4096.0
      share-mode:
        enabled: true
        pool-base: 0.0
        pool-per-online-player: 96.0
    decay:
      enabled: true
      delta: 0.8
      tau-days: 3.0
      window-days: 21
      min-multiplier: 0.10
    indices:
      epsilon-enabled: true
      special-enabled: true
      weekend-factor: 0.98
      holiday-factor: 0.95
      noise-stddev: 0.02
      epsilon-min: 0.85
      epsilon-max: 1.10
      special-index: {}

  environment:
    seasonal-amplitude: 0.15
    weekend-multiplier: 1.2
    newbie-protection: 0.2

  audit-settings:
    base-tax-rate: 0.05
    luxury-threshold: 100000.0
    luxury-tax-rate: 0.10
    poor-threshold: 10000.0
    rich-threshold: 1000000.0
    wealth-gap-tax-rate: 0.20
    velocity-threshold: 1000.0
    newbie-hours: 10.0
    veteran-hours: 100.0

    default-base-limit: 2364.0
    default-growth-rate: 16.0
    default-max-limit: 4728.0

holiday-api:
  url-template: "https://holiday.ailcc.com/api/holiday/year/{year}"


internal:
  economy-heat: 0.0
